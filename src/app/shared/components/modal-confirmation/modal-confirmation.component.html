@if (isOpen) {
  <div class="fixed inset-0 z-modal flex items-center justify-center bg-overlay p-4" (click)="onOverlayClick($event)">
    <div class="flex max-h-modal w-full max-w-modal flex-col rounded-modal bg-white shadow-2xl">
      <div class="flex items-center justify-between border-b border-border px-5 py-4">
        <h3 class="m-0 text-base font-semibold text-text">{{ title }}</h3>
        <button type="button" class="flex cursor-pointer items-center border-0 bg-transparent p-1 text-slate-500 hover:text-text" (click)="closed.emit()">
          <span class="pi pi-times"></span>
        </button>
      </div>
      <div class="overflow-y-auto p-5">
        <ng-content />
      </div>
    </div>
  </div>
}
