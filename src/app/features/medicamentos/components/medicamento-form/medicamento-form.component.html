<form [formGroup]="form" (ngSubmit)="submit()" class="med-form">

  <div class="ficha-section">
    <div class="ficha-section-title">
      <span class="pi pi-file-text"></span>
      Ficha del Producto
    </div>

    <div class="form-grid">

      <label class="field full-width">
        Nombre *
        <input type="text" formControlName="nombre"
               placeholder="Ej: SALBUVENT 2 mg / 5 mL Jarabe" maxlength="200">
        @if (hasError('nombre')) {
          <span class="field-error">El nombre es requerido</span>
        }
      </label>

      <label class="field">
        Registro Sanitario
        <input type="text" formControlName="registroSanitario"
               placeholder="Ej: EN00880" maxlength="30"
               style="text-transform:uppercase">
      </label>

      <label class="field">
        Tipo de producto
        <select formControlName="tipoProducto">
          <option value="">— Seleccionar —</option>
          @for (opt of tipoProductoOptions; track opt.value) {
            <option [value]="opt.value">{{ opt.label }}</option>
          }
        </select>
      </label>

      <label class="field full-width">
        Presentación
        <input type="text" formControlName="presentacion"
               placeholder="Ej: Frasco x 150 mL x 1 unid." maxlength="120">
      </label>

      <label class="field">
        Nombre del Fabricante
        <input type="text" formControlName="fabricante"
               placeholder="Ej: LABORATORIOS ELIFARMA S.A." maxlength="150">
      </label>

      <label class="field">
        País de fabricación
        <input type="text" formControlName="paisFabricacion"
               placeholder="Ej: Perú" maxlength="80">
      </label>

      <label class="field">
        Precio unitario S/.
        <input type="number" formControlName="precioUnitario"
               placeholder="0.00" min="0" step="0.01" [min]="0">
      </label>

      <label class="field">
        Stock mínimo *
        <input type="number" formControlName="stockMinimo" min="0">
        @if (hasError('stockMinimo')) {
          <span class="field-error">Debe ser 0 o mayor</span>
        }
        <span class="field-hint">Alerta cuando el stock total esté por debajo de este valor</span>
      </label>

      <label class="field check-field">
        <input type="checkbox" formControlName="activo">
        Medicamento activo
      </label>

    </div>
  </div>

  @if (isEditing && medicamento?.codigoSismed) {
    <div class="sismed-info">
      <span class="pi pi-info-circle"></span>
      Código SISMED asignado: <strong>{{ medicamento!.codigoSismed }}</strong>
      @if (medicamento?.descripcionSismed) {
        · {{ medicamento!.descripcionSismed }}
      }
    </div>
  }

  <div class="form-actions">
    <button type="button" class="btn-secondary" (click)="cancelled.emit()" [disabled]="isLoading">
      Cancelar
    </button>
    <button type="submit" class="btn-primary" [disabled]="isLoading">
      <span class="pi" [class.pi-save]="!isLoading" [class.pi-spin]="isLoading" [class.pi-spinner]="isLoading"></span>
      {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Registrar') }}
    </button>
  </div>

</form>
