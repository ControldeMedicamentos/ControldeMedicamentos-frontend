<form [formGroup]="form" (ngSubmit)="submit()" class="flex flex-col gap-5">
  <div class="grid grid-cols-1 gap-4 md:grid-cols-2">

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text md:col-span-2">
      Tipo de Paciente *
      <div class="flex flex-wrap gap-2">
        @for (opt of tipoPacienteOptions; track opt.value) {
          <label
            class="cursor-pointer select-none rounded-full border px-3.5 py-1.5 text-xs font-medium transition-colors"
            [class.border-primary-600]="tipoPacienteActual === opt.value"
            [class.bg-primary-600]="tipoPacienteActual === opt.value"
            [class.text-white]="tipoPacienteActual === opt.value"
            [class.border-border]="tipoPacienteActual !== opt.value"
            [class.bg-white]="tipoPacienteActual !== opt.value"
            [class.text-slate-500]="tipoPacienteActual !== opt.value"
          >
            <input type="radio" formControlName="tipoPaciente" [value]="opt.value" hidden>
            {{ opt.label }}
          </label>
        }
      </div>
    </label>

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
      Tipo de Documento *
      <select class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none" formControlName="tipoDocumento" (change)="onTipoDocChange()">
        @for (opt of tipoDocOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </label>

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
      {{ nroDocLabel }} *
      <input
        class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none"
        [class.border-red-500]="hasError('nroDocumento')"
        type="text"
        formControlName="nroDocumento"
        [placeholder]="nroDocPlaceholder"
        [attr.maxlength]="nroDocMaxLength"
        [attr.inputmode]="nroDocInputMode"
        (input)="onDocumentoInput()"
      >
      @if (hasError('nroDocumento')) {
        <span class="text-xs font-normal text-red-500">{{ nroDocError }}</span>
      }
    </label>

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text md:col-span-2">
      Nombres y Apellidos *
      <input class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none"
             [class.border-red-500]="hasError('nombresApellidos')"
             type="text" formControlName="nombresApellidos" placeholder="Nombres y apellidos completos" maxlength="150">
      @if (hasError('nombresApellidos')) {
        <span class="text-xs font-normal text-red-500">Requerido (mín. 3 letras, sin números ni caracteres especiales)</span>
      }
    </label>

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
      Sexo *
      <select class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none" formControlName="sexo">
        @for (opt of sexoOptions; track opt.value) {
          <option [value]="opt.value">{{ opt.label }}</option>
        }
      </select>
    </label>

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
      Fecha de Nacimiento
      <input
        class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none"
        type="date"
        formControlName="fechaNacimiento"
        [max]="maxFechaNacimiento"
        [min]="minFechaNacimiento"
      >
      @if (edadCalculada !== null) {
        <span class="text-xs font-semibold text-primary-600">{{ edadCalculada }} años</span>
      }
    </label>

    @if (showCarrera) {
      <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
        {{ carreraLabel }}
        @if (isCarreraSelect) {
          <select class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none" formControlName="carreraArea">
            <option value="">— Seleccionar —</option>
            @for (opt of carreraOptions; track opt) {
              <option [value]="opt">{{ opt }}</option>
            }
          </select>
        } @else {
          <input class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none" type="text" formControlName="carreraArea" [placeholder]="'Ej: ' + carreraLabel" maxlength="150">
        }
      </label>
    }

    @if (showCiclo) {
      <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
        Ciclo Académico
        <select class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none" formControlName="cicloAcademico">
          <option value="">— Seleccionar —</option>
          @for (opt of cicloOptions; track opt) {
            <option [value]="opt">{{ opt }}</option>
          }
        </select>
      </label>
    }

    <label class="flex flex-col gap-1.5 text-sm font-medium text-text">
      Teléfono
      <input class="rounded-md border border-border bg-white px-3 py-2 text-sm text-text focus:border-primary-600 focus:outline-none"
             [class.border-red-500]="hasError('telefono')"
             type="text" formControlName="telefono" placeholder="Ej: 987654321" maxlength="9" inputmode="numeric" (input)="onTelefonoInput()">
      @if (hasError('telefono')) {
        <span class="text-xs font-normal text-red-500">Teléfono debe tener 9 dígitos</span>
      }
    </label>

  </div>

  <div class="flex justify-end gap-3 border-t border-border pt-2">
    <button type="button" class="cursor-pointer rounded-md border border-border bg-white px-5 py-2 font-medium text-text hover:bg-surface-50 disabled:cursor-not-allowed disabled:opacity-60" (click)="cancelled.emit()" [disabled]="isLoading">
      Cancelar
    </button>
    <button type="submit" class="flex cursor-pointer items-center gap-1.5 rounded-md border-0 bg-primary-600 px-5 py-2 font-medium text-white hover:bg-primary-700 disabled:cursor-not-allowed disabled:opacity-60" [disabled]="isLoading || form.invalid">
      <span class="pi" [class.pi-save]="!isLoading" [class.pi-spin]="isLoading" [class.pi-spinner]="isLoading"></span>
      {{ isLoading ? 'Guardando...' : (isEditing ? 'Actualizar' : 'Registrar') }}
    </button>
  </div>
</form>
